<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password • BOOK-B</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center px-4">
  <div class="max-w-md w-full">
    <div class="text-center mb-10">
      <a href="/" class="inline-flex items-center space-x-2">
        <div class="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center">
          <i class="fas fa-book text-white text-2xl"></i>
        </div>
        <span class="text-4xl font-black text-gray-900">BOOK<span class="text-indigo-600">-B</span></span>
      </a>
      <h2 class="mt-8 text-3xl font-bold text-gray-900">Forgot Password?</h2>
      <p class="mt-2 text-gray-600">Enter your email and we'll send you a reset link</p>
    </div>

    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <form class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
          <input type="email" required placeholder="you@example.com"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
        </div>
        <button type="submit" class="w-full bg-indigo-600 text-white py-3.5 rounded-lg font-bold text-lg hover:bg-indigo-700 transition">
          Send Reset Link
        </button>
      </form>

      <div class="mt-8 text-center">
        <a href="login.html" class="text-indigo-600 hover:text-indigo-500 font-medium flex items-center justify-center space-x-1">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
          <span>Back to Login</span>
        </a>
      </div>
    </div>
  </div>
</body>
</html>
