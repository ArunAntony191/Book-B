<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up • BOOK-B</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center px-4">
  <div class="max-w-md w-full">
    <div class="text-center mb-10">
      <a href="/" class="inline-flex items-center space-x-2">
        <div class="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center">
          <i class="fas fa-book text-white text-2xl"></i>
        </div>
        <span class="text-4xl font-black text-gray-900">BOOK<span class="text-indigo-600">-B</span></span>
      </a>
      <h2 class="mt-8 text-3xl font-bold text-gray-900">Join BOOK-B Today</h2>
      <p class="mt-2 text-gray-600">Start borrowing books for free in seconds</p>
    </div>

    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <button class="w-full border border-gray-300 py-3.5 rounded-lg font-medium flex items-center justify-center space-x-3 hover:bg-gray-50 transition mb-6">
        <img src="https://www.google.com/favicon.ico" alt="Google" class="h-5 w-5">
        <span>Sign up with Google</span>
      </button>

      <div class="relative mb-6">
        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-300"></div></div>
        <div class="relative flex justify-center text-sm"><span class="px-4 bg-white text-gray-500">Or use email</span></div>
      </div>

      <form class="space-y-5">
        <div class="grid grid-cols-2 gap-4">
          <input type="text" placeholder="First Name" required class="px-4 py-3 border rounded-lg focus:ring-2 focus:ring-indigo-500">
          <input type="text" placeholder="Last Name" required class="px-4 py-3 border rounded-lg focus:ring-2 focus:ring-indigo-500">
        </div>
        <input type="email" placeholder="Email" required class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-indigo-500">
        <input type="password" placeholder="Create Password" required class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-indigo-500">

        <label class="flex items-start text-sm">
          <input type="checkbox" required class="mt-1">
          <span class="ml-3 text-gray-600">I agree to the <a href="#" class="text-indigo-600 underline">Terms</a> and <a href="#" class="text-indigo-600 underline">Privacy Policy</a></span>
        </label>

        <button type="submit" class="w-full bg-indigo-600 text-white py-3.5 rounded-lg font-bold text-lg hover:bg-indigo-700 transition">
          Create Free Account
        </button>
      </form>

      <p class="mt-8 text-center text-gray-600">
        Already have an account? <a href="login.html" class="font-bold text-indigo-600 hover:text-indigo-500">Log in</a>
      </p>
    </div>
  </div>
</body>
</html>
