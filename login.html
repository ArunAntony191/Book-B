<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login • BOOK-B</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center px-4">
  <div class="max-w-md w-full">
    <div class="text-center mb-10">
      <a href="/" class="inline-flex items-center space-x-2">
        <div class="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center">
          <i class="fas fa-book text-white text-2xl"></i>
        </div>
        <span class="text-4xl font-black text-gray-900">BOOK<span class="text-indigo-600">-B</span></span>
      </a>
      <h2 class="mt-8 text-3xl font-bold text-gray-900">Welcome back!</h2>
      <p class="mt-2 text-gray-600">Log in to see your borrowed books</p>
    </div>

    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <form class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
          <input type="email" required placeholder="you@example.com"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
          <input type="password" required placeholder="••••••••"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
        </div>

        <div class="flex items-center justify-between">
          <label class="flex items-center text-sm">
            <input type="checkbox" class="rounded text-indigo-600">
            <span class="ml-2 text-gray-600">Remember me</span>
          </label>
          <a href="forgot-password.html" class="text-sm text-indigo-600 hover:text-indigo-500 font-medium">Forgot password?</a>
        </div>

        <button type="submit" class="w-full bg-indigo-600 text-white py-3.5 rounded-lg font-bold text-lg hover:bg-indigo-700 transition">
          Sign In
        </button>
      </form>

      <div class="mt-8">
        <div class="relative">
          <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-300"></div></div>
          <div class="relative flex justify-center text-sm"><span class="px-4 bg-white text-gray-500">Or</span></div>
        </div>

        <button class="mt-6 w-full border border-gray-300 py-3.5 rounded-lg font-medium flex items-center justify-center space-x-3 hover:bg-gray-50 transition">
          <img src="https://www.google.com/favicon.ico" alt="Google" class="h-5 w-5">
          <span>Continue with Google</span>
        </button>
      </div>

      <p class="mt-8 text-center text-center text-gray-600">
        New to BOOK-B? <a href="register.html" class="font-bold text-indigo-600 hover:text-indigo-500">Create free account</a>
      </p>
    </div>
  </div>
</body>
</html>
